services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - tmp_data:/tmp/rag_uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s       # Check every 10 seconds
      timeout: 10s        # Allow up to 10 seconds for curl to respond
      retries: 10         # Try up to 10 times before giving up
      start_period: 60s   # CRITICAL: Ignore all failures for the first 60 seconds while ML model loads

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  tmp_data: